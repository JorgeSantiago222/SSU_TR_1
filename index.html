<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salem State University Tree Database</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --navy:#0f2847;
      --navy-2:#17375f;
      --orange:#f47c20;
      --cream:#f7f5f1;
      --card:#ffffff;
      --line:#d7dde6;
      --text:#11263f;
      --muted:#617187;
      --shadow:0 14px 34px rgba(17,38,63,.10);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#f6f8fb 0%,#eef2f7 100%);
      color:var(--text);
    }
    header{
      background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
      color:#fff;
      padding:28px 20px;
      box-shadow:var(--shadow);
    }
    header .wrap, main{max-width:1240px;margin:0 auto}
    h1{margin:0;font-size:clamp(1.8rem,3vw,2.6rem)}
    .sub{margin-top:8px;color:rgba(255,255,255,.84)}
    main{padding:24px 20px 40px}
    .toolbar{
      display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:14px;
      background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
      padding:18px;box-shadow:var(--shadow);margin-bottom:10px;
      align-items:end;
    }
    .toolbar-title{
      grid-column:1 / -1;
      font-weight:700;
      color:var(--navy);
      font-size:1rem;
      margin-bottom:2px;
    }
    .toolbar-footer{
      margin:0 0 18px;
      color:var(--muted);
      font-size:.95rem;
      padding:0 4px;
    }
    .field label{display:block;font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:6px}
    .field input,.field select{
      width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;
      font:inherit;background:#fff;color:var(--text);
    }
    .stats{font-size:.95rem;color:var(--muted);white-space:nowrap}
    .layout{display:grid;grid-template-columns:minmax(340px,460px) 1fr;gap:18px;align-items:start}
    .panel{
      background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);overflow:hidden;
    }
    .panel-head{padding:16px 18px;border-bottom:1px solid var(--line);font-weight:700}
    .list{max-height:72vh;overflow:auto}
    .tree-item{
      width:100%;text-align:left;background:#fff;border:0;border-bottom:1px solid var(--line);
      padding:16px 18px;cursor:pointer;display:block;
    }
    .tree-item:hover,.tree-item.active{background:#f7fafc}
    .tree-item:last-child{border-bottom:0}
    .item-top{display:flex;justify-content:space-between;gap:10px;align-items:start}
    .item-name{font-weight:700;font-size:1rem}
    .item-meta{color:var(--muted);font-size:.9rem;margin-top:6px;display:flex;flex-wrap:wrap;gap:8px 12px}
    .badge{
      display:inline-flex;align-items:center;padding:4px 9px;border-radius:999px;
      font-size:.78rem;background:#eef4fb;color:var(--navy);border:1px solid #dce6f2
    }
    .detail{padding:20px}
    .detail h2{margin:0;font-size:clamp(1.5rem,2vw,2rem)}
    .detail-meta{margin-top:8px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px 14px}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}
    .button{
      appearance:none;border:0;text-decoration:none;cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 16px;border-radius:12px;font-weight:700;font-size:.95rem;
    }
    .button.primary{background:var(--navy);color:#fff}
    .button.secondary{background:#f2f6fb;color:var(--navy);border:1px solid var(--line)}
    .button.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
    .button:disabled{opacity:.65;cursor:not-allowed}
    .url-box{
      border:1px dashed #cfd8e3;background:#f9fbfd;border-radius:14px;padding:14px;margin:0 0 18px;
    }
    .url-box label{display:block;font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:8px}
    .url-box code{
      display:block;white-space:nowrap;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:.86rem;color:var(--navy)
    }
    .grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;
    }
    .info-card{
      border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;
      min-height:84px;
    }
    .info-card .label{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:none}
    .info-card .value{margin-top:7px;font-size:1rem;font-weight:700;line-height:1.35;word-break:break-word}
    .empty,.error{padding:24px 20px;color:var(--muted)}
    .error{color:#8b1e1e}
    @media (max-width: 980px){
      .toolbar{grid-template-columns:1fr;align-items:stretch}
      .layout{grid-template-columns:1fr}
      .list{max-height:none}
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Salem State University Tree Database</h1>
      <div class="sub">Browse the official campus tree inventory.</div>
    </div>
  </header>

  <main>
    <section class="toolbar">
      <div class="toolbar-title">Filter the tree list</div>
      <div class="field">
        <label for="searchInput">Search trees</label>
        <input id="searchInput" type="search" placeholder="Search by tree name, ID, genus, condition, or campus" />
      </div>
      <div class="field">
        <label for="campusSelect">Campus</label>
        <select id="campusSelect">
          <option value="">All campuses</option>
        </select>
      </div>
      <div class="field">
        <label for="typeSelect">Tree species</label>
        <select id="typeSelect">
          <option value="">All tree species</option>
        </select>
      </div>
    </section>
    <div class="toolbar-footer" id="statsText">Loading trees…</div>

    <section class="layout">
      <div class="panel">
        <div class="panel-head">Trees</div>
        <div id="treeList" class="list">
          <div class="empty">Loading workbook…</div>
        </div>
      </div>

      <div class="panel">
        <div class="detail" id="detailPanel">
          <div class="empty">Select a tree to view its details.</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const WORKBOOK_FILE = "./officialtreedatabase_NFC.xlsx";
    const CAMPUS_MAP_URL = "#";
    const VISIBLE_FIELDS_IN_CARDS = null; // null = show all non-empty fields except title field

    let allTrees = [];
    let filteredTrees = [];
    let selectedKey = null;

    function formatLabel(label){
      return String(label || "")
        .replaceAll("_", " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeValue(value){
      if (value === null || value === undefined) return "";
      if (typeof value === "number") {
        return Number.isInteger(value) ? String(value) : String(Number(value.toFixed(2)));
      }
      return String(value).trim();
    }

    function campusValue(row){
      return normalizeValue(row["Campus/Location"]);
    }

    function displayName(row){
      return normalizeValue(row["Tree_Spe_1"]) || normalizeValue(row["Tree_ID"]) || "Unnamed tree";
    }

    function treeId(row){
      const id = normalizeValue(row["Tree_ID"]);
      return id && id.toLowerCase() !== "nan" ? id : "";
    }

    function treeType(row){
      return normalizeValue(row["Tree_Spe_1"]);
    }

    function treeKey(row, index){
      return `row-${index + 2}`;
    }

    function publicTreeUrl(tree){
      const url = new URL("./tree.html", window.location.href);
      url.searchParams.set("row", tree.__rowNumber);
      return url.toString();
    }

    function mapUrlForTree(tree){
      const directMap =
        normalizeValue(tree["map_url"]) ||
        normalizeValue(tree["map_link"]) ||
        normalizeValue(tree["Map_URL"]) ||
        normalizeValue(tree["ArcGIS_URL"]);
      if (directMap) return directMap;
      if (CAMPUS_MAP_URL && CAMPUS_MAP_URL !== "#") return CAMPUS_MAP_URL;
      return "";
    }

    function viewableEntries(tree){
      const hidden = new Set(["__key","__rowNumber"]);
      const titleField = "Tree_Spe_1";
      return Object.entries(tree).filter(([key, value]) => {
        if (hidden.has(key)) return false;
        if (key === titleField) return false;
        const cleaned = normalizeValue(value);
        if (!cleaned || cleaned.toLowerCase() === "nan") return false;
        if (VISIBLE_FIELDS_IN_CARDS && !VISIBLE_FIELDS_IN_CARDS.includes(key)) return false;
        return true;
      });
    }

    async function loadWorkbook(){
      const response = await fetch(WORKBOOK_FILE, { cache: "no-store" });
      if (!response.ok) throw new Error(`Could not load ${WORKBOOK_FILE}`);
      const buffer = await response.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array" });
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

      return rows.map((row, index) => ({
        ...row,
        __key: treeKey(row, index),
        __rowNumber: index + 2
      }));
    }

    function applyFilters(){
      const search = document.getElementById("searchInput").value.trim().toLowerCase();
      const campus = document.getElementById("campusSelect").value;
      const type = document.getElementById("typeSelect").value;

      filteredTrees = allTrees.filter(tree => {
        const campusMatch = !campus || campusValue(tree) === campus;
        if (!campusMatch) return false;

        const typeMatch = !type || treeType(tree) === type;
        if (!typeMatch) return false;

        if (!search) return true;

        const haystack = [
          displayName(tree),
          treeId(tree),
          treeType(tree),
          normalizeValue(tree["genus"]),
          normalizeValue(tree["Condition"]),
          normalizeValue(tree["Campus/Location"])
        ].join(" ").toLowerCase();

        return haystack.includes(search);
      });

      if (!filteredTrees.some(tree => tree.__key === selectedKey)) {
        selectedKey = filteredTrees[0]?.__key || null;
      }

      renderList();
      renderDetail();
      renderStats();
    }

    function renderStats(){
      const count = filteredTrees.length;
      const total = allTrees.length;
      document.getElementById("statsText").textContent =
        `${count} of ${total} trees`;
    }

    function renderCampusOptions(){
      const select = document.getElementById("campusSelect");
      const campuses = [...new Set(allTrees.map(campusValue).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      for (const campus of campuses){
        const option = document.createElement("option");
        option.value = campus;
        option.textContent = campus;
        select.appendChild(option);
      }
    }

    function renderTypeOptions(){
      const select = document.getElementById("typeSelect");
      const types = [...new Set(allTrees.map(treeType).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      for (const type of types){
        const option = document.createElement("option");
        option.value = type;
        option.textContent = type;
        select.appendChild(option);
      }
    }

    function renderList(){
      const list = document.getElementById("treeList");
      list.innerHTML = "";

      if (!filteredTrees.length){
        list.innerHTML = '<div class="empty">No trees match your search.</div>';
        return;
      }

      const fragment = document.createDocumentFragment();

      filteredTrees.forEach(tree => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tree-item" + (tree.__key === selectedKey ? " active" : "");
        button.addEventListener("click", () => {
          selectedKey = tree.__key;
          renderList();
          renderDetail();
        });

        const idText = treeId(tree) || `Row ${tree.__rowNumber}`;
        button.innerHTML = `
          <div class="item-top">
            <div class="item-name">${escapeHtml(displayName(tree))}</div>
            <span class="badge">${escapeHtml(idText)}</span>
          </div>
          <div class="item-meta">
            <span>${escapeHtml(campusValue(tree) || "Campus not listed")}</span>
            ${normalizeValue(tree["Condition"]) ? `<span>${escapeHtml(normalizeValue(tree["Condition"]))}</span>` : ``}
            ${normalizeValue(tree["genus"]) ? `<span>${escapeHtml(normalizeValue(tree["genus"]))}</span>` : ``}
          </div>
        `;
        fragment.appendChild(button);
      });

      list.appendChild(fragment);
    }

    function renderDetail(){
      const panel = document.getElementById("detailPanel");
      const tree = filteredTrees.find(item => item.__key === selectedKey);

      if (!tree){
        panel.innerHTML = '<div class="empty">Select a tree to view its details.</div>';
        return;
      }

      const idText = treeId(tree) || `Row ${tree.__rowNumber}`;
      const url = publicTreeUrl(tree);
      const mapUrl = mapUrlForTree(tree);
      const cards = viewableEntries(tree).map(([label, value]) => `
        <div class="info-card">
          <div class="label">${escapeHtml(formatLabel(label))}</div>
          <div class="value">${escapeHtml(normalizeValue(value))}</div>
        </div>
      `).join("");

      panel.innerHTML = `
        <h2>${escapeHtml(displayName(tree))}</h2>
        <div class="detail-meta">
          <span><strong>Tree ID:</strong> ${escapeHtml(idText)}</span>
          ${campusValue(tree) ? `<span><strong>Campus:</strong> ${escapeHtml(campusValue(tree))}</span>` : ``}
        </div>

        <div class="actions">
          <a class="button primary" href="./tree.html?row=${encodeURIComponent(tree.__rowNumber)}">Open Tree Page</a>
          <button class="button secondary" type="button" id="mapButton">Show on Map</button>
        </div>

        <div class="url-box">
          <label>NFC / public tree link</label>
          <code>${escapeHtml(url)}</code>
        </div>

        <div class="grid">${cards}</div>
      `;

      const mapButton = document.getElementById("mapButton");
      mapButton.addEventListener("click", () => {
        if (mapUrl) {
          window.open(mapUrl, "_blank", "noopener");
        } else {
          alert("Map link will be connected to the ArcGIS map soon.");
        }
      });
    }

    function escapeHtml(value){
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function init(){
      try{
        allTrees = await loadWorkbook();
        renderCampusOptions();
        renderTypeOptions();
        selectedKey = allTrees[0]?.__key || null;

        document.getElementById("searchInput").addEventListener("input", applyFilters);
        document.getElementById("campusSelect").addEventListener("change", applyFilters);
        document.getElementById("typeSelect").addEventListener("change", applyFilters);

        applyFilters();
      }catch(error){
        console.error(error);
        document.getElementById("treeList").innerHTML = `
          <div class="error">
            Could not load the workbook. Make sure <strong>officialtreedatabase_NFC.xlsx</strong>
            is in the same folder as this page and view the site through GitHub Pages.
          </div>
        `;
        document.getElementById("detailPanel").innerHTML = `
          <div class="error">${escapeHtml(error.message || "Workbook failed to load.")}</div>
        `;
        document.getElementById("statsText").textContent = "Workbook not loaded";
      }
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salem State University Tree Database</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#d8dfeb;
      --text:#12233d;
      --muted:#5e6f8c;
      --navy:#002855;
      --navy-2:#0a3970;
      --orange:#f58220;
      --orange-soft:#fff2e6;
      --shadow:0 14px 34px rgba(0,33,71,.10);
      --radius:18px;
      --warn:#8a4b00;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:linear-gradient(180deg,#eef3fb 0%, var(--bg) 100%)}
    .wrap{max-width:1200px;margin:0 auto;padding:24px 16px 56px}
    .hero{background:linear-gradient(135deg,var(--navy) 0%, var(--navy-2) 100%);color:#fff;border-radius:30px;padding:30px;box-shadow:var(--shadow);margin-bottom:22px}
    .hero-badge{display:inline-block;background:rgba(245,130,32,.16);color:#ffd3a8;border:1px solid rgba(255,255,255,.12);padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.04em;margin-bottom:14px;text-transform:uppercase}
    .hero h1{margin:0;font-size:clamp(30px,5vw,46px);line-height:1.05}
    .notice{background:var(--orange-soft);color:var(--warn);border:1px solid #f4c596;border-radius:14px;padding:14px 16px;margin:0 0 20px;display:none}
    .toolbar{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:12px;margin-bottom:20px}
    .input,.select,.button{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:15px}
    .button{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;cursor:pointer;text-decoration:none}
    .button.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
    .button.secondary{background:#fff;color:var(--navy)}
    .layout{display:grid;grid-template-columns:1.05fr .95fr;gap:22px}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}
    .panel-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .panel-head h2{margin:0;font-size:22px;color:var(--navy)}
    .subtle{color:var(--muted);font-size:14px}
    .tree-list{max-height:64vh;overflow:auto}
    .tree-item{padding:16px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s ease,border-left-color .15s ease;border-left:4px solid transparent}
    .tree-item:hover,.tree-item.active{background:#f6f9fe;border-left-color:var(--orange)}
    .tree-title{margin:0 0 4px;font-weight:700}
    .tree-meta{margin:0;color:var(--muted);font-size:14px}
    .detail{padding:22px}
    .tag{display:inline-block;background:#e8f0fb;color:var(--navy);padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px}
    .detail h3{margin:0 0 6px;font-size:34px;color:var(--navy)}
    .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:18px 0}
    .stat{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fbfcff}
    .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
    .value{font-size:18px;font-weight:700}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
    .muted-box{margin-top:16px;padding:14px;border-radius:14px;background:#f8fafd;border:1px dashed var(--line);color:var(--muted);font-size:14px;line-height:1.55}
    code{background:#eef3fb;color:var(--navy);padding:2px 6px;border-radius:6px;word-break:break-all}
    @media (max-width:960px){.layout{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.tree-list{max-height:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-badge">Campus tree inventory</div>
      <h1>Salem State University Tree Database</h1>
    </section>

    <div id="notice" class="notice"></div>

    <div class="toolbar">
      <input id="searchBox" class="input" type="text" placeholder="Search by ID, name, species, or location">
      <select id="speciesFilter" class="select">
        <option value="">All tree names</option>
      </select>
      <select id="healthFilter" class="select">
        <option value="">All health statuses</option>
      </select>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2>Tree Inventory</h2>
          <div class="subtle"><span id="countLabel">0</span> trees shown</div>
        </div>
        <div id="treeList" class="tree-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Tree Details</h2>
          <div class="subtle">Visitor view</div>
        </div>
        <div id="detail" class="detail"></div>
      </section>
    </div>
  </div>

  <script>
    const sampleTrees = [
      {tree_id:"T001",common_name:"Northern Red Oak",scientific_name:"Quercus rubra",planting_year:"1998",dbh:"48 cm",height:"18 m",health:"Good",location_name:"Library Walk",lat:"42.5033",lon:"-70.8890",map_link:""},
      {tree_id:"T002",common_name:"Sugar Maple",scientific_name:"Acer saccharum",planting_year:"2005",dbh:"30 cm",height:"12 m",health:"Fair",location_name:"Science Quad",lat:"42.5037",lon:"-70.8885",map_link:""},
      {tree_id:"T003",common_name:"Eastern White Pine",scientific_name:"Pinus strobus",planting_year:"2012",dbh:"22 cm",height:"10 m",health:"Excellent",location_name:"North Residence Lawn",lat:"42.5042",lon:"-70.8880",map_link:""}
    ];

    let allTrees = [];
    let filteredTrees = [];
    let activeTreeId = null;

    function normalizeKey(s){return String(s||"").trim().toLowerCase().replace(/[^\w]+/g,"_").replace(/^_+|_+$/g,"")}
    function escapeHtml(str){return String(str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;")}

    function csvToObjects(text){
      const rows=[]; let row=[], field="", inQuotes=false;
      for(let i=0;i<text.length;i++){
        const char=text[i], next=text[i+1];
        if(char==='"'){
          if(inQuotes && next==='"'){ field+='"'; i++; }
          else{ inQuotes=!inQuotes; }
        } else if(char==="," && !inQuotes){ row.push(field); field=""; }
        else if((char==="\n"||char==="\r") && !inQuotes){ if(char==="\r"&&next==="\n") i++; row.push(field); if(row.some(cell=>String(cell).trim()!=="")) rows.push(row); row=[]; field=""; }
        else{ field+=char; }
      }
      if(field.length || row.length){ row.push(field); if(row.some(cell=>String(cell).trim()!=="")) rows.push(row); }
      if(!rows.length) return [];
      const headers = rows[0].map(h=>normalizeKey(h));
      return rows.slice(1).map(cols=>{ const obj={}; headers.forEach((h,idx)=>obj[h]=(cols[idx]||"").trim()); return obj; });
    }

    function remapTree(obj){
      return {
        tree_id: obj.tree_id || obj.id || "",
        page_slug: obj.page_slug || "",
        common_name: obj.common_name || obj.tree_name || obj.name || "",
        scientific_name: obj.scientific_name || obj.species || "",
        planting_year: obj.planting_year || obj.year_planted || "",
        dbh: obj.dbh || obj.diameter || "",
        height: obj.height || "",
        health: obj.health || obj.health_status || obj.condition || "",
        location_name: obj.location_name || obj.location_zone || obj.location || "",
        lat: obj.lat || obj.latitude || "",
        lon: obj.lon || obj.longitude || "",
        map_link: obj.map_link || ""
      };
    }

    const CAMPUS_MAP_URL = "https://your-arcgis-map-url";

    function makeMapLink(tree){
      return tree.map_url || tree.map_link || tree.arcgis_url || tree.arcgis_map || tree.webmap_url || tree.storymap_url || tree.map || CAMPUS_MAP_URL || (tree.lat && tree.lon ? `https://maps.google.com/?q=${encodeURIComponent(tree.lat)},${encodeURIComponent(tree.lon)}` : "");
    }

    function makeTreePageLink(tree){
      const id = tree.page_slug || tree.tree_id || "";
      return `tree.html?id=${encodeURIComponent(id)}`;
    }

    function makeNfcUrl(tree){
      const treePath = makeTreePageLink(tree);
      return new URL(treePath, window.location.href).toString();
    }

    function uniqSorted(values){ return [...new Set(values.filter(Boolean))].sort((a,b)=>a.localeCompare(b)); }

    function fillFilters(trees){
      const speciesValues = uniqSorted(trees.map(t => t.common_name));
      const healthValues = uniqSorted(trees.map(t => t.health));
      speciesFilter.innerHTML = `<option value="">All tree names</option>` + speciesValues.map(v => `<option>${escapeHtml(v)}</option>`).join("");
      healthFilter.innerHTML = `<option value="">All health statuses</option>` + healthValues.map(v => `<option>${escapeHtml(v)}</option>`).join("");
    }

    function renderList(){
      const q=searchBox.value.trim().toLowerCase();
      const species=speciesFilter.value;
      const health=healthFilter.value;

      filteredTrees = allTrees.filter(tree => {
        const hay = [tree.tree_id,tree.page_slug,tree.common_name,tree.scientific_name,tree.location_name,tree.health].join(" ").toLowerCase();
        return (!q || hay.includes(q)) && (!species || tree.common_name===species) && (!health || tree.health===health);
      });

      countLabel.textContent = filteredTrees.length;
      treeList.innerHTML = filteredTrees.map(tree => `
        <div class="tree-item ${tree.tree_id===activeTreeId ? "active" : ""}" data-id="${escapeHtml(tree.tree_id)}">
          <p class="tree-title">${escapeHtml(tree.common_name || "Unnamed Tree")}</p>
          <p class="tree-meta">${escapeHtml(tree.scientific_name || "No species")} • ${escapeHtml(tree.tree_id || "No ID")} • ${escapeHtml(tree.location_name || "No location")}</p>
        </div>
      `).join("");

      document.querySelectorAll(".tree-item").forEach(el => {
        el.addEventListener("click", () => {
          activeTreeId = el.dataset.id;
          renderList();
          renderDetail(activeTreeId);
        });
      });

      if(!filteredTrees.some(t => t.tree_id === activeTreeId) && filteredTrees.length){
        activeTreeId = filteredTrees[0].tree_id;
      }

      if(activeTreeId){
        renderDetail(activeTreeId);
      } else {
        document.title = "Salem State University Tree Database";
        detail.innerHTML = `<div class="muted-box">No trees match the current filters.</div>`;
      }
    }

    function renderDetail(treeId){
      const tree = allTrees.find(t => t.tree_id === treeId) || filteredTrees[0];
      if(!tree){
        document.title = "Salem State University Tree Database";
        detail.innerHTML = `<div class="muted-box">No tree selected.</div>`;
        return;
      }

      const mapLink = makeMapLink(tree);
      const treePageLink = makeTreePageLink(tree);
      const nfcUrl = makeNfcUrl(tree);
      const pageTitle = tree.common_name || tree.tree_id || "Salem State University Tree Database";
      document.title = `${pageTitle} | Salem State University Tree Database`;

      detail.innerHTML = `
        <div class="tag">Tree ID: ${escapeHtml(tree.tree_id || "N/A")}</div>
        <h3>${escapeHtml(tree.common_name || "Unnamed Tree")}</h3>
        <div class="stats">
          <div class="stat"><div class="label">Planting Year</div><div class="value">${escapeHtml(tree.planting_year || "—")}</div></div>
          <div class="stat"><div class="label">DBH</div><div class="value">${escapeHtml(tree.dbh || "—")}</div></div>
          <div class="stat"><div class="label">Height</div><div class="value">${escapeHtml(tree.height || "—")}</div></div>
          <div class="stat"><div class="label">Health</div><div class="value">${escapeHtml(tree.health || "—")}</div></div>
          <div class="stat"><div class="label">Location</div><div class="value">${escapeHtml(tree.location_name || "—")}</div></div>
          <div class="stat"><div class="label">Species</div><div class="value">${escapeHtml(tree.scientific_name || "—")}</div></div>
        </div>
        <div class="actions">
          <a class="button secondary" href="${escapeHtml(treePageLink)}">Open tree page</a>
          ${mapLink ? `<a class="button primary" href="${escapeHtml(mapLink)}" target="_blank" rel="noopener noreferrer">Open map</a>` : ``}
        </div>
        <div class="muted-box">
          NFC URL for this tree:<br>
          <code>${escapeHtml(nfcUrl)}</code>
        </div>
      `;
    }

    async function loadDefaultCsvIfAvailable(){
      const csvCandidates = ["fake_tree_health_master.csv", "trees.csv"];
      for(const filename of csvCandidates){
        try{
          const res = await fetch(filename, {cache:"no-store"});
          if(!res.ok) throw new Error(`${filename} not found`);
          const text = await res.text();
          const parsed = csvToObjects(text).map(remapTree).filter(t => t.tree_id);
          if(!parsed.length) throw new Error("CSV contained no valid rows");
          allTrees = parsed;
          notice.textContent = `CSV loaded successfully from ${filename}.`;
          notice.style.display = "block";
          fillFilters(allTrees);
          activeTreeId = allTrees[0]?.tree_id || null;
          renderList();
          return;
        }catch(err){}
      }
      allTrees = sampleTrees;
      notice.style.display = "none";
      fillFilters(allTrees);
      activeTreeId = allTrees[0]?.tree_id || null;
      renderList();
    }

    searchBox.addEventListener("input", renderList);
    speciesFilter.addEventListener("change", renderList);
    healthFilter.addEventListener("change", renderList);
    loadDefaultCsvIfAvailable();
  </script>
</body>
</html>

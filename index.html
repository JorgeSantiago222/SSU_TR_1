<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salem State University Tree Database</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --navy:#0f2847;
      --navy-2:#17375f;
      --orange:#f47c20;
      --cream:#f7f5f1;
      --ink:#1f2937;
      --muted:#6b7280;
      --line:#d7dde6;
      --card:#ffffff;
      --shadow:0 10px 24px rgba(15,40,71,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--ink);
      background:linear-gradient(180deg,#f4f7fb 0%, #eef3f9 100%);
    }
    .shell{
      max-width:1320px;
      margin:0 auto;
      padding:24px;
    }
    .hero{
      background:linear-gradient(135deg,var(--navy) 0%, var(--navy-2) 100%);
      color:#fff;
      border-radius:28px;
      padding:28px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }
    .hero h1{
      margin:0 0 10px 0;
      font-size:clamp(1.9rem, 3vw, 2.7rem);
      line-height:1.1;
    }
    .hero p{
      margin:0;
      color:rgba(255,255,255,.88);
      max-width:800px;
    }
    .hero-stats{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:18px;
    }
    .stat{
      background:rgba(255,255,255,.11);
      border:1px solid rgba(255,255,255,.18);
      border-radius:999px;
      padding:10px 14px;
      font-size:.95rem;
    }
    .layout{
      display:grid;
      grid-template-columns:380px 1fr;
      gap:20px;
      align-items:start;
    }
    .card{
      background:var(--card);
      border:1px solid rgba(15,40,71,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .panel-head{
      padding:18px 18px 12px;
      border-bottom:1px solid var(--line);
    }
    .panel-head h2{
      margin:0;
      font-size:1.1rem;
    }
    .panel-body{
      padding:18px;
    }
    .controls{
      display:grid;
      gap:12px;
      margin-top:14px;
    }
    .control-label{
      font-size:.86rem;
      color:var(--muted);
      margin-bottom:6px;
      display:block;
    }
    input[type="search"], select{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      font-size:1rem;
      background:#fff;
    }
    .list{
      max-height:72vh;
      overflow:auto;
      padding:8px 10px 16px;
    }
    .tree-item{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background:#fff;
      border-radius:16px;
      padding:14px;
      margin:10px 0;
      cursor:pointer;
      transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .tree-item:hover{
      transform:translateY(-1px);
      border-color:#b6c2d1;
      box-shadow:0 8px 18px rgba(15,40,71,.08);
    }
    .tree-item.active{
      border-color:var(--orange);
      box-shadow:0 0 0 3px rgba(244,124,32,.16);
    }
    .tree-name{
      font-weight:700;
      font-size:1rem;
      margin-bottom:6px;
    }
    .tree-meta{
      color:var(--muted);
      font-size:.93rem;
      display:flex;
      flex-wrap:wrap;
      gap:8px 12px;
    }
    .detail-empty{
      padding:48px 18px;
      color:var(--muted);
    }
    .title-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:16px;
    }
    .title-row h2{
      margin:0;
      font-size:clamp(1.7rem,2.5vw,2.3rem);
      line-height:1.08;
    }
    .subchips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      background:#f6f8fb;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:.93rem;
      color:#374151;
    }
    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:2px 0 18px;
    }
    .btn, .btn:visited{
      appearance:none;
      border:none;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px 16px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, opacity .12s ease, box-shadow .12s ease;
    }
    .btn:hover{ transform:translateY(-1px); }
    .btn-primary{ background:var(--navy); color:#fff; }
    .btn-secondary{ background:var(--orange); color:#fff; }
    .btn-soft{ background:#eef3f9; color:var(--navy); border:1px solid var(--line); }
    .nfc-box{
      background:#fff8f2;
      border:1px solid #ffd2ae;
      border-radius:16px;
      padding:14px 16px;
      margin-bottom:18px;
    }
    .nfc-label{
      font-weight:700;
      color:#8a4b10;
      margin-bottom:8px;
    }
    .nfc-row{
      display:flex;
      gap:10px;
      align-items:flex-start;
      flex-wrap:wrap;
    }
    .nfc-url{
      word-break:break-all;
      font-family:Consolas, Monaco, monospace;
      background:#fff;
      border:1px solid #ffd2ae;
      padding:10px 12px;
      border-radius:12px;
      flex:1 1 300px;
      min-width:0;
    }
    .fields{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
      gap:12px;
    }
    .field{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      background:#fff;
      min-height:88px;
    }
    .field-label{
      font-size:.82rem;
      letter-spacing:.02em;
      color:var(--muted);
      margin-bottom:8px;
      word-break:break-word;
    }
    .field-value{
      font-size:1rem;
      font-weight:700;
      line-height:1.35;
      word-break:break-word;
    }
    .footer-note{
      color:var(--muted);
      margin-top:14px;
      font-size:.92rem;
    }
    .hidden{display:none !important;}
    .status{
      color:var(--muted);
      padding:14px 18px;
      font-size:.95rem;
    }
    @media (max-width: 980px){
      .layout{ grid-template-columns:1fr; }
      .list{ max-height:none; }
      .title-row{ flex-direction:column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>Salem State University Tree Database</h1>
      <p>Browse the campus tree inventory, open an individual viewer page for each tree, and copy the NFC destination link from the main database page.</p>
      <div class="hero-stats" id="heroStats"></div>
    </section>

    <section class="layout">
      <aside class="card">
        <div class="panel-head">
          <h2>Tree Inventory</h2>
          <div class="controls">
            <div>
              <label class="control-label" for="searchInput">Search by tree name, ID, genus, condition, or campus</label>
              <input type="search" id="searchInput" placeholder="Search trees..." />
            </div>
            <div>
              <label class="control-label" for="campusFilter">Filter by campus</label>
              <select id="campusFilter">
                <option value="all">All campuses</option>
              </select>
            </div>
          </div>
        </div>
        <div class="status" id="listStatus">Loading workbook...</div>
        <div class="list" id="treeList"></div>
      </aside>

      <main class="card">
        <div class="panel-body" id="detailPanel">
          <div class="detail-empty">Select a tree to view its details.</div>
        </div>
      </main>
    </section>
  </div>

  <script>
    const WORKBOOK_FILE = "./officialtreedatabase_NFC.xlsx";
    const SHEET_NAME = "officialtreedatabase_NFC";
    const TREE_PAGE_FILE = "./tree_single_sheet_excel.html";
    const CAMPUS_MAP_URLS = {
      "north campus": "",
      "south campus": ""
    };

    let allTrees = [];
    let filteredTrees = [];
    let selectedKey = null;

    function normalizeText(value) {
      return String(value ?? "").trim();
    }

    function normalizeCampus(value) {
      return normalizeText(value).toLowerCase();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === "") return "";
      if (typeof value === "number") {
        return Number.isInteger(value) ? String(value) : value.toFixed(2).replace(/\.00$/, "");
      }
      return String(value);
    }

    function getTreeDisplayName(tree) {
      return normalizeText(tree.Tree_Spe_1) || normalizeText(tree.Tree_ID) || "Unnamed tree";
    }

    function getCampus(tree) {
      return normalizeText(tree["Campus/Location"]) || "Unknown campus";
    }

    function getTreeSubtitle(tree) {
      const bits = [];
      if (normalizeText(tree.Tree_ID)) bits.push(tree.Tree_ID);
      if (getCampus(tree)) bits.push(getCampus(tree));
      return bits.join(" · ");
    }

    function getMapUrl(tree) {
      const directFields = ["map_url", "map_link", "Map_URL", "Map_Link", "arcgis_url", "ArcGIS_URL"];
      for (const field of directFields) {
        if (normalizeText(tree[field])) return normalizeText(tree[field]);
      }
      const campusKey = normalizeCampus(tree["Campus/Location"]);
      if (CAMPUS_MAP_URLS[campusKey]) return CAMPUS_MAP_URLS[campusKey];
      return "";
    }

    function openMapForTree(tree) {
      const url = getMapUrl(tree);
      if (url) {
        window.open(url, "_blank", "noopener");
      } else {
        alert("Map link placeholder only for now. Add your ArcGIS URL in the page file when you're ready.");
      }
    }

    function getViewerUrl(tree) {
      return `${TREE_PAGE_FILE}?key=${encodeURIComponent(tree.__record_key)}`;
    }

    function getNfcUrl(tree) {
      const absolute = new URL(getViewerUrl(tree), window.location.href);
      return absolute.toString();
    }

    function dedupeExactRows(rows) {
      const seen = new Set();
      return rows.filter(row => {
        const signature = JSON.stringify(row);
        if (seen.has(signature)) return false;
        seen.add(signature);
        return true;
      });
    }

    function addRecordKeys(rows) {
      const idCounts = {};
      rows.forEach(row => {
        const id = normalizeText(row.Tree_ID);
        if (!id) return;
        idCounts[id] = (idCounts[id] || 0) + 1;
      });
      return rows.map((row, index) => {
        const id = normalizeText(row.Tree_ID);
        const sourceRow = row.__source_row || (index + 2);
        const recordKey = id && idCounts[id] === 1 ? id : `${id || "ROW"}-${sourceRow}`;
        return { ...row, __record_key: recordKey };
      });
    }

    async function loadWorkbookRows() {
      const response = await fetch(WORKBOOK_FILE, { cache: "no-store" });
      if (!response.ok) throw new Error(`Could not load ${WORKBOOK_FILE}`);
      const buffer = await response.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array" });
      const sheet = workbook.Sheets[SHEET_NAME] || workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      rows.forEach((row, idx) => row.__source_row = idx + 2);
      return addRecordKeys(dedupeExactRows(rows));
    }

    function buildStats() {
      const hero = document.getElementById("heroStats");
      const campusCounts = {};
      allTrees.forEach(tree => {
        const campus = getCampus(tree);
        campusCounts[campus] = (campusCounts[campus] || 0) + 1;
      });
      const stats = [
        `${allTrees.length} trees`,
        ...Object.entries(campusCounts)
          .sort((a, b) => a[0].localeCompare(b[0]))
          .map(([campus, count]) => `${count} on ${campus}`)
      ];
      hero.innerHTML = stats.map(text => `<div class="stat">${escapeHtml(text)}</div>`).join("");
    }

    function buildCampusFilter() {
      const select = document.getElementById("campusFilter");
      const current = select.value;
      const campuses = [...new Set(allTrees.map(tree => getCampus(tree)).filter(Boolean))].sort();
      select.innerHTML = `<option value="all">All campuses</option>` +
        campuses.map(campus => `<option value="${escapeHtml(campus)}">${escapeHtml(campus)}</option>`).join("");
      if ([...select.options].some(opt => opt.value === current)) select.value = current;
    }

    function applyFilters() {
      const query = normalizeText(document.getElementById("searchInput").value).toLowerCase();
      const campus = document.getElementById("campusFilter").value;
      filteredTrees = allTrees.filter(tree => {
        const haystack = [
          tree.Tree_ID,
          tree.Tree_Spe_1,
          tree.genus,
          tree.Condition,
          tree.Vigor,
          tree["Campus/Location"]
        ].map(v => normalizeText(v).toLowerCase()).join(" ");
        const matchesQuery = !query || haystack.includes(query);
        const matchesCampus = campus === "all" || getCampus(tree) === campus;
        return matchesQuery && matchesCampus;
      }).sort((a, b) => {
        const nameCompare = getTreeDisplayName(a).localeCompare(getTreeDisplayName(b));
        if (nameCompare !== 0) return nameCompare;
        return normalizeText(a.Tree_ID).localeCompare(normalizeText(b.Tree_ID));
      });

      if (!filteredTrees.some(tree => tree.__record_key === selectedKey)) {
        selectedKey = filteredTrees[0]?.__record_key || null;
      }

      renderList();
      renderDetail();
    }

    function renderList() {
      const list = document.getElementById("treeList");
      const status = document.getElementById("listStatus");
      status.textContent = filteredTrees.length ? `${filteredTrees.length} trees shown` : `No trees match the current filters.`;
      if (!filteredTrees.length) {
        list.innerHTML = "";
        return;
      }
      list.innerHTML = filteredTrees.map(tree => {
        const active = tree.__record_key === selectedKey ? " active" : "";
        return `
          <button class="tree-item${active}" data-key="${escapeHtml(tree.__record_key)}">
            <div class="tree-name">${escapeHtml(getTreeDisplayName(tree))}</div>
            <div class="tree-meta">
              <span>${escapeHtml(normalizeText(tree.Tree_ID) || "No Tree_ID")}</span>
              <span>${escapeHtml(getCampus(tree))}</span>
              ${normalizeText(tree.genus) ? `<span>${escapeHtml(tree.genus)}</span>` : ``}
            </div>
          </button>
        `;
      }).join("");

      list.querySelectorAll(".tree-item").forEach(button => {
        button.addEventListener("click", () => {
          selectedKey = button.dataset.key;
          renderList();
          renderDetail();
        });
      });
    }

    function renderFields(tree) {
      const hiddenKeys = new Set(["__record_key", "__source_row"]);
      const entries = Object.entries(tree)
        .filter(([key, value]) => !hiddenKeys.has(key) && normalizeText(value) !== "");
      return entries.map(([key, value]) => `
        <div class="field">
          <div class="field-label">${escapeHtml(key)}</div>
          <div class="field-value">${escapeHtml(formatValue(value))}</div>
        </div>
      `).join("");
    }

    function copyNfcUrl(tree) {
      const url = getNfcUrl(tree);
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById("copyNfcButton");
        if (!btn) return;
        const original = btn.textContent;
        btn.textContent = "Copied";
        setTimeout(() => btn.textContent = original, 1200);
      }).catch(() => {
        alert("Could not copy the NFC URL automatically.");
      });
    }

    function renderDetail() {
      const panel = document.getElementById("detailPanel");
      const tree = filteredTrees.find(item => item.__record_key === selectedKey);
      if (!tree) {
        panel.innerHTML = `<div class="detail-empty">Select a tree to view its details.</div>`;
        return;
      }
      const name = getTreeDisplayName(tree);
      const nfcUrl = getNfcUrl(tree);
      panel.innerHTML = `
        <div class="title-row">
          <div>
            <h2>${escapeHtml(name)}</h2>
            <div class="subchips">
              ${normalizeText(tree.Tree_ID) ? `<span class="chip">Tree_ID: ${escapeHtml(tree.Tree_ID)}</span>` : ``}
              <span class="chip">${escapeHtml(getCampus(tree))}</span>
            </div>
          </div>
        </div>

        <div class="actions">
          <a class="btn btn-primary" href="${escapeHtml(getViewerUrl(tree))}">Open Tree Page</a>
          <button class="btn btn-secondary" id="mapButton" type="button">Show on Map</button>
        </div>

        <div class="nfc-box">
          <div class="nfc-label">NFC URL</div>
          <div class="nfc-row">
            <div class="nfc-url">${escapeHtml(nfcUrl)}</div>
            <button class="btn btn-soft" id="copyNfcButton" type="button">Copy NFC URL</button>
          </div>
        </div>

        <div class="fields">
          ${renderFields(tree)}
        </div>
      `;
      document.getElementById("mapButton").addEventListener("click", () => openMapForTree(tree));
      document.getElementById("copyNfcButton").addEventListener("click", () => copyNfcUrl(tree));
    }

    async function init() {
      try {
        allTrees = await loadWorkbookRows();
        buildStats();
        buildCampusFilter();
        document.getElementById("searchInput").addEventListener("input", applyFilters);
        document.getElementById("campusFilter").addEventListener("change", applyFilters);
        applyFilters();
      } catch (error) {
        document.getElementById("listStatus").textContent = "Could not load the Excel file.";
        document.getElementById("detailPanel").innerHTML = `<div class="detail-empty">${escapeHtml(error.message)}</div>`;
      }
    }

    init();
  </script>
</body>
</html>

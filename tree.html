<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tree Viewer | Salem State University Tree Database</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --navy:#0f2847;
      --navy-2:#17375f;
      --orange:#f47c20;
      --card:#ffffff;
      --line:#d7dde6;
      --text:#11263f;
      --muted:#617187;
      --shadow:0 14px 34px rgba(17,38,63,.10);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f6f8fb 0%,#eef2f7 100%);
      min-height:100vh;
    }
    .wrap{max-width:980px;margin:0 auto;padding:28px 20px 40px}
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:22px;
      box-shadow:var(--shadow);overflow:hidden;
    }
    .hero{
      background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
      color:#fff;padding:28px 24px 22px;
    }
    .hero h1{margin:0;font-size:clamp(1.9rem,3vw,2.7rem)}
    .hero-meta{margin-top:10px;color:rgba(255,255,255,.86);display:flex;flex-wrap:wrap;gap:10px 14px}
    .content{padding:22px 24px 26px}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
    .button{
      appearance:none;border:0;cursor:pointer;text-decoration:none;
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 16px;border-radius:12px;font-weight:700;font-size:.95rem;
    }
    .button.primary{background:var(--navy);color:#fff}
    .grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;
    }
    .info-card{
      border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;
      min-height:84px;
    }
    .label{font-size:.78rem;font-weight:700;color:var(--muted)}
    .value{margin-top:7px;font-size:1rem;font-weight:700;line-height:1.35;word-break:break-word}
    .state,.error{
      padding:34px 26px;text-align:center;color:var(--muted)
    }
    .error{color:#8b1e1e}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="app">
      <div class="state">Loading tree…</div>
    </div>
  </div>

  <script>
    const WORKBOOK_FILE = "./officialtreedatabase_NFC.xlsx";
    const CAMPUS_MAP_URL = "#";

    function normalizeValue(value){
      if (value === null || value === undefined) return "";
      if (typeof value === "number") {
        return Number.isInteger(value) ? String(value) : String(Number(value.toFixed(2)));
      }
      return String(value).trim();
    }

    function formatLabel(label){
      return String(label || "")
        .replaceAll("_", " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function treeId(row){
      const id = normalizeValue(row["Tree_ID"]);
      return id && id.toLowerCase() !== "nan" ? id : "";
    }

    function displayName(row){
      return normalizeValue(row["Tree_Spe_1"]) || treeId(row) || "Unnamed tree";
    }

    function campusValue(row){
      return normalizeValue(row["Campus/Location"]);
    }

    function mapUrlForTree(tree){
      const directMap =
        normalizeValue(tree["map_url"]) ||
        normalizeValue(tree["map_link"]) ||
        normalizeValue(tree["Map_URL"]) ||
        normalizeValue(tree["ArcGIS_URL"]);
      if (directMap) return directMap;
      if (CAMPUS_MAP_URL && CAMPUS_MAP_URL !== "#") return CAMPUS_MAP_URL;
      return "";
    }

    function escapeHtml(value){
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function loadRows(){
      const response = await fetch(WORKBOOK_FILE, { cache: "no-store" });
      if (!response.ok) throw new Error(`Could not load ${WORKBOOK_FILE}`);
      const buffer = await response.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array" });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      return XLSX.utils.sheet_to_json(sheet, { defval: "" }).map((row, index) => ({
        ...row,
        __rowNumber: index + 2
      }));
    }

    function getRequestedRow(){
      const params = new URLSearchParams(window.location.search);
      const row = Number(params.get("row"));
      return Number.isFinite(row) && row >= 2 ? row : null;
    }

    function renderTree(tree){
      const app = document.getElementById("app");
      const idText = treeId(tree) || `Row ${tree.__rowNumber}`;
      document.title = `${displayName(tree)} | Salem State University Tree Database`;

      const cards = Object.entries(tree)
        .filter(([key, value]) => {
          if (key === "__rowNumber" || key === "Tree_Spe_1") return false;
          const cleaned = normalizeValue(value);
          return cleaned && cleaned.toLowerCase() !== "nan";
        })
        .map(([key, value]) => `
          <div class="info-card">
            <div class="label">${escapeHtml(formatLabel(key))}</div>
            <div class="value">${escapeHtml(normalizeValue(value))}</div>
          </div>
        `)
        .join("");

      app.innerHTML = `
        <div class="hero">
          <h1>${escapeHtml(displayName(tree))}</h1>
          <div class="hero-meta">
            <span><strong>Tree ID:</strong> ${escapeHtml(idText)}</span>
            ${campusValue(tree) ? `<span><strong>Campus:</strong> ${escapeHtml(campusValue(tree))}</span>` : ``}
          </div>
        </div>
        <div class="content">
          <div class="actions">
            <button class="button primary" type="button" id="mapButton">Show on Map</button>
          </div>
          <div class="grid">${cards}</div>
        </div>
      `;

      const mapUrl = mapUrlForTree(tree);
      document.getElementById("mapButton").addEventListener("click", () => {
        if (mapUrl) {
          window.open(mapUrl, "_blank", "noopener");
        } else {
          alert("Map link will be connected to the ArcGIS map soon.");
        }
      });
    }

    async function init(){
      const app = document.getElementById("app");
      try{
        const rows = await loadRows();
        const rowNumber = getRequestedRow();
        const tree = rows.find(item => item.__rowNumber === rowNumber) || rows[0];

        if (!tree){
          app.innerHTML = '<div class="state">No tree records were found in the workbook.</div>';
          return;
        }

        renderTree(tree);
      }catch(error){
        console.error(error);
        app.innerHTML = `
          <div class="error">
            Could not load the workbook. Make sure <strong>officialtreedatabase_NFC.xlsx</strong>
            is in the same folder as this page and open the site through GitHub Pages.
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>

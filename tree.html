<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tree Detail</title>
  <style>
    :root{--bg:#f5f7fb;--card:#ffffff;--line:#d8dfeb;--text:#12233d;--muted:#5e6f8c;--navy:#002855;--navy-2:#0a3970;--orange:#f58220;--shadow:0 14px 34px rgba(0,33,71,.10)}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:linear-gradient(180deg,#eef3fb 0%, var(--bg) 100%)}
    .wrap{max-width:1000px;margin:0 auto;padding:24px 16px 56px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}
    .hero{background:linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);color:#fff;padding:28px}.hero h1{margin:0 0 8px;font-size:clamp(28px,5vw,42px)}.hero p{margin:0;color:#dbe7f7}
    .body{padding:22px}.tag{display:inline-block;background:#e8f0fb;color:var(--navy);padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px}
    .latin{margin:0 0 16px;font-style:italic;color:var(--muted);font-size:19px}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:18px 0}
    .stat{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fbfcff}.label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}.value{font-size:18px;font-weight:700}
    .section-title{margin:26px 0 12px;font-size:20px;color:var(--navy)}
    .data-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .field{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fbfcff}
    .field.full{grid-column:1 / -1}
    .field-name{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
    .field-value{line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}.button{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;cursor:pointer;text-decoration:none;padding:14px 16px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--navy)}
    .button.primary{background:var(--navy);color:#fff;border-color:var(--navy)} .muted-box{margin-top:16px;padding:14px;border-radius:14px;background:#f8fafd;border:1px dashed var(--line);color:var(--muted);font-size:14px;line-height:1.55}
    code{background:#eef3fb;color:var(--navy);padding:2px 6px;border-radius:6px;word-break:break-all}
    @media (max-width:720px){.stats,.data-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <h1 id="title">Loading tree...</h1>
        <p>This page looks up the selected tree from the same master CSV used by the main inventory.</p>
      </div>
      <div id="body" class="body">Loading record…</div>
    </div>
  </div>
<script>
const DEFAULT_CSV_CANDIDATES = ["fake_tree_health_master.csv", "trees.csv"];
function normalizeKey(s){return String(s||"").trim().toLowerCase().replace(/[^\w]+/g,"_").replace(/^_+|_+$/g,"")}
function escapeHtml(str){return String(str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;")}
function prettifyKey(key){return String(key||"").replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase())}
function csvToObjects(text){const rows=[];let row=[],field="",inQuotes=false;for(let i=0;i<text.length;i++){const char=text[i],next=text[i+1];if(char==='"'){if(inQuotes&&next==='"'){field+='"';i++;}else{inQuotes=!inQuotes;}}else if(char===","&&!inQuotes){row.push(field);field="";}else if((char==="\n"||char==="\r")&&!inQuotes){if(char==="\r"&&next==="\n")i++;row.push(field);if(row.some(cell=>String(cell).trim()!==""))rows.push(row);row=[];field="";}else{field+=char;}}if(field.length||row.length){row.push(field);if(row.some(cell=>String(cell).trim()!==""))rows.push(row);}if(!rows.length)return[];const headers=rows[0].map(h=>normalizeKey(h));return rows.slice(1).map(cols=>{const obj={};headers.forEach((h,idx)=>obj[h]=(cols[idx]||"").trim());return obj;});}
function remapTree(obj){const id=obj.tree_id||obj.id||"";const pageSlug=obj.page_slug||(id?String(id).toLowerCase().replace(/[^a-z0-9]+/g,"-"):"");return{raw:obj,tree_id:id,page_slug:pageSlug,common_name:obj.common_name||obj.tree_name||obj.name||"",scientific_name:obj.scientific_name||obj.species||"",health:obj.health||obj.health_status||obj.condition||"",health_score:obj.health_score||"",last_inspection_date:obj.last_inspection_date||"",location_name:obj.location_name||obj.location_zone||obj.location||"",lat:obj.lat||obj.latitude||"",lon:obj.lon||obj.longitude||"",map_link:obj.map_link||""};}
function makeMapLink(tree){if(tree.map_link)return tree.map_link;if(tree.lat&&tree.lon)return `https://maps.google.com/?q=${encodeURIComponent(tree.lat)},${encodeURIComponent(tree.lon)}`;return "";}
async function loadTrees(){for(const filename of DEFAULT_CSV_CANDIDATES){try{const res=await fetch(filename,{cache:"no-store"});if(!res.ok)throw new Error();const text=await res.text();const parsed=csvToObjects(text).map(remapTree).filter(t=>t.tree_id);if(parsed.length)return parsed;}catch(err){}}return [];}
function buildFieldCards(raw){const preferred=["tree_id","page_slug","tree_name","common_name","name","species","scientific_name","location_zone","location_name","location","health_status","health","condition","health_score","last_inspection_date","recommended_action","notes","description","canopy_condition","trunk_condition","pest_or_disease_notes","latitude","longitude","lat","lon","map_link"];
  const keys=Object.keys(raw||{}).filter(k=>String(raw[k]||"").trim()!=="");
  keys.sort((a,b)=>{const ia=preferred.indexOf(a), ib=preferred.indexOf(b); if(ia===-1&&ib===-1) return a.localeCompare(b); if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib;});
  return keys.map(key=>{const value=String(raw[key]||""); const full=value.includes("\n") || value.length>70; return `<div class="field ${full?'full':''}"><div class="field-name">${escapeHtml(prettifyKey(key))}</div><div class="field-value">${escapeHtml(value)}</div></div>`;}).join("");
}
function renderTree(tree){document.getElementById('title').textContent=tree.common_name||tree.tree_id||'Tree';const mapLink=makeMapLink(tree);document.getElementById('body').innerHTML=`<div class="tag">Tree ID: ${escapeHtml(tree.tree_id || "N/A")}</div><p class="latin">${escapeHtml(tree.scientific_name || "Species coming later")}</p><div class="stats"><div class="stat"><div class="label">Health</div><div class="value">${escapeHtml(tree.health||"—")}</div></div><div class="stat"><div class="label">Health Score</div><div class="value">${escapeHtml(tree.health_score||"—")}</div></div><div class="stat"><div class="label">Last Inspection</div><div class="value">${escapeHtml(tree.last_inspection_date||"—")}</div></div><div class="stat"><div class="label">Location</div><div class="value">${escapeHtml(tree.location_name||"—")}</div></div></div><h2 class="section-title">Tree Record</h2><div class="data-grid">${buildFieldCards(tree.raw)}</div><div class="actions"><a class="button primary" href="index_dynamic.html">Back to inventory</a>${mapLink?`<a class="button" target="_blank" rel="noopener noreferrer" href="${escapeHtml(mapLink)}">Open map</a>`:''}</div>`;}
(async()=>{const params=new URLSearchParams(window.location.search);const id=(params.get('id')||'').trim();const trees=await loadTrees();if(!trees.length){document.getElementById('title').textContent='No CSV found';document.getElementById('body').innerHTML='<div class="muted-box">Put <code>fake_tree_health_master.csv</code> beside this file so the page can load real tree data.</div>';return;}const tree=trees.find(t=>t.tree_id===id||t.page_slug===id);if(!tree){document.getElementById('title').textContent='Tree not found';document.getElementById('body').innerHTML=`<div class="muted-box">No tree matched <code>${escapeHtml(id)}</code>. Return to the inventory and choose a valid link.</div><div class="actions"><a class="button primary" href="index_dynamic.html">Back to inventory</a></div>`;return;}renderTree(tree);})();
</script>
</body>
</html>
